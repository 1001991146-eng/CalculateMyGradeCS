<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון ציוני בגרות - מדעי המחשב והנדסת תוכנה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #f3f4f6;
        }
        .tab-active {
            border-bottom: 3px solid #2563eb;
            color: #2563eb;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border-t-8 border-blue-600">
        <!-- Header -->
        <header class="p-6 text-center border-b bg-white">
            <h1 class="text-3xl font-black text-blue-900 mb-2">ניהול ציוני מגמה</h1>
            <p class="text-gray-500 font-medium italic">רכזת מדעי המחשב והנדסת תוכנה</p>
            
            <div class="mt-4">
                <button id="warToggle" onclick="toggleWarMode()" class="px-6 py-2 rounded-full text-sm font-bold transition-all shadow-sm border border-orange-300 bg-orange-50 text-orange-700">
                    ⚠️ מתווה הקלות מלחמה פעיל
                </button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="flex border-b bg-gray-50">
            <button onclick="switchTab('cs')" id="tab-cs" class="flex-1 py-4 text-center font-bold tab-active transition-colors">מדעי המחשב (5 יח"ל)</button>
            <button onclick="switchTab('eng')" id="tab-eng" class="flex-1 py-4 text-center font-bold text-gray-400 hover:text-blue-600 transition-colors border-r">הנדסת תוכנה (5 יח"ל)</button>
        </nav>

        <div class="p-6">
            <!-- מדעי המחשב -->
            <div id="section-cs" class="space-y-6">
                <div class="bg-blue-50 p-4 rounded-xl border-r-4 border-blue-400">
                    <p class="text-sm text-blue-800">
                        <strong>מבנה הציון:</strong> 70% שאלון עיוני (בחינה חיצונית) ו-30% הערכה חלופית/מעבדה.
                    </p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">שאלון 371 (עיוני 70%)</label>
                        <input type="number" id="cs371" oninput="calculate()" placeholder="0-100" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none text-lg bg-gray-50 focus:bg-white transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">שאלון 271 (מעבדה/30%)</label>
                        <input type="number" id="cs271" oninput="calculate()" placeholder="0-100" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none text-lg bg-gray-50 focus:bg-white transition-all">
                    </div>
                </div>

                <!-- Transparency Box CS -->
                <div id="csCalcDetails" class="hidden p-4 bg-gray-50 border border-dashed border-gray-300 rounded-lg text-sm text-gray-600">
                    <h4 class="font-bold mb-1">פירוט החישוב:</h4>
                    <p id="csCalcString"></p>
                </div>

                <div class="mt-6 p-6 bg-blue-600 rounded-2xl text-white text-center shadow-lg transform transition-transform hover:scale-[1.01]">
                    <p class="text-blue-100 text-sm mb-1 uppercase tracking-wider font-bold">ציון סופי משוער - מדעי המחשב</p>
                    <div id="csFinal" class="text-6xl font-black">0</div>
                </div>
            </div>

            <!-- הנדסת תוכנה -->
            <div id="section-eng" class="hidden space-y-6">
                <div class="flex justify-center bg-gray-100 p-1 rounded-xl mb-6">
                    <button onclick="setSpec('cyber')" id="spec-cyber" class="flex-1 py-2 rounded-lg text-sm font-bold bg-white shadow text-blue-700">הגנת סייבר</button>
                    <button onclick="setSpec('apps')" id="spec-apps" class="flex-1 py-2 rounded-lg text-sm font-bold text-gray-500">פיתוח אפליקציות</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label id="specLabel" class="block text-sm font-bold text-gray-700 mb-1">שאלון 373 (מבוא 40%)</label>
                        <input type="number" id="eng373" oninput="calculate()" placeholder="0-100" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none text-lg bg-gray-50 focus:bg-white transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">שאלון 589 (פרויקט 60%)</label>
                        <input type="number" id="eng589" oninput="calculate()" placeholder="0-100" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none text-lg bg-gray-50 focus:bg-white transition-all">
                    </div>
                </div>

                <!-- Transparency Box ENG -->
                <div id="engCalcDetails" class="hidden p-4 bg-gray-50 border border-dashed border-gray-300 rounded-lg text-sm text-gray-600">
                    <h4 class="font-bold mb-1">פירוט החישוב:</h4>
                    <p id="engCalcString"></p>
                </div>

                <div class="mt-6 p-6 bg-slate-800 rounded-2xl text-white text-center shadow-lg transform transition-transform hover:scale-[1.01]">
                    <p class="text-slate-400 text-sm mb-1 uppercase tracking-wider font-bold">ציון סופי - הנדסת תוכנה</p>
                    <div id="engFinal" class="text-6xl font-black">0</div>
                </div>
            </div>
        </div>

        <footer class="bg-gray-50 p-4 border-t text-center">
            <p class="text-xs text-gray-500 font-bold mb-2">מערכת ניהול פדגוגית מגמת הנדסת תוכנה</p>
            <div class="flex justify-center gap-4 text-[10px] text-gray-400">
                <span>סמל שאלון 899371/271</span>
                <span>•</span>
                <span>סמל שאלון 899373/589</span>
            </div>
        </footer>
    </div>

    <script>
        let isWarMode = true;
        let currentSpec = 'cyber';

        function toggleWarMode() {
            isWarMode = !isWarMode;
            const btn = document.getElementById('warToggle');
            if (isWarMode) {
                btn.innerHTML = '⚠️ מתווה הקלות מלחמה פעיל';
                btn.className = 'px-6 py-2 rounded-full text-sm font-bold transition-all shadow-sm border border-orange-300 bg-orange-50 text-orange-700';
            } else {
                btn.innerHTML = '✅ מתווה שנה רגילה';
                btn.className = 'px-6 py-2 rounded-full text-sm font-bold transition-all shadow-sm border border-green-300 bg-green-50 text-green-700';
            }
            calculate();
        }

        function switchTab(tab) {
            document.getElementById('section-cs').classList.toggle('hidden', tab !== 'cs');
            document.getElementById('section-eng').classList.toggle('hidden', tab !== 'eng');
            document.getElementById('tab-cs').className = `flex-1 py-4 text-center font-bold ${tab === 'cs' ? 'tab-active' : 'text-gray-400'}`;
            document.getElementById('tab-eng').className = `flex-1 py-4 text-center font-bold ${tab === 'eng' ? 'tab-active' : 'text-gray-400'} border-r`;
        }

        function setSpec(spec) {
            currentSpec = spec;
            const cyberBtn = document.getElementById('spec-cyber');
            const appsBtn = document.getElementById('spec-apps');
            const label = document.getElementById('specLabel');

            if (spec === 'cyber') {
                cyberBtn.className = 'flex-1 py-2 rounded-lg text-sm font-bold bg-white shadow text-blue-700';
                appsBtn.className = 'flex-1 py-2 rounded-lg text-sm font-bold text-gray-500';
                label.innerText = 'שאלון 373 (סייבר - 40%)';
            } else {
                appsBtn.className = 'flex-1 py-2 rounded-lg text-sm font-bold bg-white shadow text-blue-700';
                cyberBtn.className = 'flex-1 py-2 rounded-lg text-sm font-bold text-gray-500';
                label.innerText = 'שאלון 373 (אינטרנט - 40%)';
            }
            calculate();
        }

        function calculate() {
            // CS Calculation
            const v371 = parseFloat(document.getElementById('cs371').value) || 0;
            const v271 = parseFloat(document.getElementById('cs271').value) || 0;
            
            const csFinalValue = (v371 * 0.7) + (v271 * 0.3);
            document.getElementById('csFinal').innerText = Math.round(csFinalValue);
            
            if(v371 > 0 || v271 > 0) {
                document.getElementById('csCalcDetails').classList.remove('hidden');
                document.getElementById('csCalcString').innerHTML = `(${v371} × 0.7) + (${v271} × 0.3) = <strong>${csFinalValue.toFixed(2)}</strong>`;
            }

            // ENG Calculation
            const v373 = parseFloat(document.getElementById('eng373').value) || 0;
            const v589 = parseFloat(document.getElementById('eng589').value) || 0;
            
            const engFinalValue = (v373 * 0.4) + (v589 * 0.6);
            document.getElementById('engFinal').innerText = Math.round(engFinalValue);

            if(v373 > 0 || v589 > 0) {
                document.getElementById('engCalcDetails').classList.remove('hidden');
                document.getElementById('engCalcString').innerHTML = `(${v373} × 0.4) + (${v589} × 0.6) = <strong>${engFinalValue.toFixed(2)}</strong>`;
            }
        }
    </script>
</body>
</html>
